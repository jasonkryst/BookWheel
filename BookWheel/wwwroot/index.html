<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Book Wheel</title>
  <link rel="stylesheet" href="css/site.css" />
</head>
<body>
  <main class="shell">
    <section id="loginView" class="card">
      <h1 id="authTitle">Book Wheel Login</h1>
      <p id="authMessage" class="message"></p>
      <form id="loginForm" class="stack">
        <label>
          Username
          <input id="username" autocomplete="username" required />
        </label>
        <label>
          Password
          <input id="password" type="password" autocomplete="current-password" required />
        </label>
        <button id="authSubmitBtn" type="submit">Log in</button>
        <p id="loginError" class="error"></p>
      </form>
    </section>

    <section id="appView" class="app hidden">
      <header class="toolbar card">
        <h1>Book Wheel</h1>
        <div class="toolbar-actions">
          <button id="importExportBtn" type="button" class="secondary icon-btn" title="Import or export books" aria-label="Import or export books">
            <span class="icon-glyph" aria-hidden="true">⇅</span>
          </button>
          <button id="themeToggleBtn" type="button" class="secondary icon-btn" title="Switch theme" aria-label="Switch theme">
            <span id="themeToggleIcon" class="icon-glyph" aria-hidden="true">☾</span>
          </button>
          <button id="logoutBtn" class="secondary">Log out</button>
        </div>
      </header>

      <section class="card wheel-card top-wheel">
        <h2>Spin wheel</h2>
        <div class="wheel-wrap">
          <canvas id="wheelCanvas" width="420" height="420"></canvas>
          <div class="pointer"></div>
        </div>
        <button id="spinBtn">Spin</button>
        <p id="selectedBook" class="message selected-book"></p>
      </section>

      <section class="grid management-grid">
        <div class="card books-card">
          <h2>Active books</h2>
          <p id="booksTotalCount" class="message books-total-count"></p>
          <form id="bookForm" class="book-add-row">
            <input id="bookTitle" maxlength="200" placeholder="Book title" required />
            <button type="submit">Add</button>
          </form>
          <div id="activeBooks" class="book-list"></div>
          <div id="booksPagination" class="pagination hidden">
            <button id="booksPrevPageBtn" type="button" class="secondary">Previous</button>
            <span id="booksPageInfo" class="message"></span>
            <button id="booksNextPageBtn" type="button" class="secondary">Next</button>
          </div>
          <p id="bookMessage" class="message"></p>
        </div>
      </section>
    </section>
  </main>

  <dialog id="editDialog" class="modal">
    <form id="editForm" method="dialog" class="stack">
      <h2>Edit book title</h2>
      <input id="editBookId" type="hidden" />
      <label>
        Book title
        <input id="editBookTitle" maxlength="200" required />
      </label>
      <div class="actions modal-actions">
        <button type="button" id="cancelEditBtn" class="secondary">Cancel</button>
        <button type="submit">Save</button>
      </div>
      <p id="editError" class="error"></p>
    </form>
  </dialog>

  <dialog id="deleteDialog" class="modal">
    <form method="dialog" class="stack">
      <h2>Remove book</h2>
      <p id="deleteConfirmMessage" class="message"></p>
      <div class="actions modal-actions">
        <button type="button" id="cancelDeleteBtn" class="secondary">Cancel</button>
        <button type="button" id="confirmDeleteBtn" class="book-remove-btn">Remove</button>
      </div>
      <p id="deleteError" class="error"></p>
    </form>
  </dialog>

  <dialog id="transferDialog" class="modal transfer-modal">
    <form method="dialog" class="stack">
      <h2>Import / Export books</h2>

      <div class="tab-row">
        <button type="button" id="importTabBtn" class="secondary tab-btn active" aria-controls="importPanel" aria-selected="true">Import</button>
        <button type="button" id="exportTabBtn" class="secondary tab-btn" aria-controls="exportPanel" aria-selected="false">Export</button>
      </div>

      <section id="importPanel" class="tab-panel">
        <p class="message">Import JSON data and merge into your list. Existing title matches are skipped case-insensitively.</p>
        <label>
          Choose JSON file
          <input id="importJsonFile" type="file" accept="application/json,.json" />
        </label>
        <div class="actions modal-actions">
          <button type="button" id="cancelTransferBtn" class="secondary">Close</button>
          <button type="button" id="importFileBtn">Import File</button>
        </div>
      </section>

      <section id="exportPanel" class="tab-panel hidden">
        <p class="message">Download your current books as a JSON file.</p>
        <div class="actions modal-actions">
          <button type="button" id="closeExportBtn" class="secondary">Close</button>
          <button type="button" id="downloadExportBtn" class="secondary">Download JSON</button>
        </div>
      </section>

      <p id="transferMessage" class="message"></p>
      <p id="transferError" class="error"></p>
    </form>
  </dialog>

  <footer class="app-footer">
    <span id="appVersion" class="message">Version: loading...</span>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
